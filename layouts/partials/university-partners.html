{{- $showHeader := .showHeader | default true -}}
<section
  class="uni-partners"
  {{- if $showHeader }}
  aria-labelledby="uni-partners-title"
  {{- else }}
  aria-label="University partners"
  {{- end }}
>
  <div class="uni-partners__inner">
    {{- if $showHeader }}
    <header class="uni-partners__header">
      <p class="uni-partners__eyebrow">Partners</p>
      <h2 id="uni-partners-title" class="uni-partners__title">University Partners</h2>
    </header>
    {{- end }}

    <div class="uni-partners__marquee" aria-hidden="true">
      <div class="uni-partners__track">
        <div class="uni-partners__row">
          <a class="uni-partners__item" href="https://kohlbacherlab.org/" target="_blank" rel="noopener noreferrer">
            <img src="/images/logos/logo-uni-tuebingen.png" alt="University of Tübingen" loading="lazy" decoding="async" />
          </a>
          <a class="uni-partners__item" href="http://www.mi.fu-berlin.de/en/inf/groups/abi/index.html" target="_blank" rel="noopener noreferrer">
            <img src="/images/logos/fu-berlin.png" alt="FU Berlin" loading="lazy" decoding="async" />
          </a>
          <a class="uni-partners__item" href="http://www.imsb.ethz.ch/research/aebersold.html" target="_blank" rel="noopener noreferrer">
            <img src="/images/logos/zurich.jpeg" alt="ETH Zürich" loading="lazy" decoding="async" />
          </a>
          <a class="uni-partners__item" href="http://www.sanger.ac.uk/" target="_blank" rel="noopener noreferrer">
            <img src="/images/logos/logo-sanger.png" alt="Wellcome Sanger Institute" loading="lazy" decoding="async" />
          </a>
          <a class="uni-partners__item" href="https://www.ebi.ac.uk/" target="_blank" rel="noopener noreferrer">
            <img src="/images/logos/emblebi.png" alt="EMBL-EBI" loading="lazy" decoding="async" />
          </a>
          <a class="uni-partners__item" href="http://www.moleculargenetics.utoronto.ca/faculty/2017/7/19/hannes-rost" target="_blank" rel="noopener noreferrer">
            <img src="/images/logos/toronto.jpeg" alt="University of Toronto" loading="lazy" decoding="async" />
          </a>
          <a class="uni-partners__item" href="https://www.biosustain.dtu.dk/" target="_blank" rel="noopener noreferrer">
            <img src="/images/logos/DTU-logo.png" alt="DTU Biosustain" loading="lazy" decoding="async" />
          </a>
          <a class="uni-partners__item" href="https://www.zib.de/" target="_blank" rel="noopener noreferrer">
            <img src="/images/logos/ziblogo.png" alt="ZIB" loading="lazy" decoding="async" />
          </a>
        </div>
        <div class="uni-partners__row" aria-hidden="true">
