<section class="content-padding flex-row publications-layout">
  <div class="content-container publications-layout__container">
    <div class="governance-page publications-page" data-publications-year-filter>
      <header class="governance-hero" aria-label="OpenMS publications">
        <p class="governance-hero__eyebrow">Research</p>
        <h1 class="governance-hero__title">
          OpenMS in <span>peer-reviewed</span> publications.
        </h1>
        <p class="governance-hero__description">
          A curated bibliography of scientific publications that reference OpenMS software, methods, and workflows.
          Showing publications from the two most recent years. Use the dropdown to switch between them.
        </p>
      </header>

      <div class="publications-body">
        {{ .Content }}
      </div>
    </div>
  </div>
</section>
