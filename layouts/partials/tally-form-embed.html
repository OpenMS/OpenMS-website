<div class="contact-page__form-body" aria-label="OpenMS contact form">
  <iframe
    class="contact-page__tally-iframe"
    data-tally-src="https://tally.so/embed/pbV6Qq?alignLeft=1&transparentBackground=1&dynamicHeight=1"
    width="100%"
    height="600"
    frameborder="0"
    marginheight="0"
    marginwidth="0"
    title="Welcome To OpenMS"
    loading="lazy"
  ></iframe>
</div>
<script async src="https://tally.so/widgets/embed.js"></script>
<script>
(function () {
  function loadTallyEmbeds() {
    if (typeof window.Tally !== "undefined") {
      window.Tally.loadEmbeds();
      return;
    }

    document.querySelectorAll("iframe[data-tally-src]:not([src])").forEach(function (iframe) {
      iframe.src = iframe.dataset.tallySrc;
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", loadTallyEmbeds);
  } else {
    loadTallyEmbeds();
  }
})();
</script>
