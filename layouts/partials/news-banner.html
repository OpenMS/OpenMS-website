{{- $banner := .Site.Params.newsBanner }}
{{- if and $banner $banner.enabled }}
<aside class="news-banner" role="region" aria-label="Site announcement">
  <div class="news-banner__inner">
    <div class="news-banner__content">
      {{- with $banner.label }}
      <span class="news-banner__eyebrow">{{ . }}</span>
      {{- end }}
      <p class="news-banner__headline">{{ $banner.text }}</p>
    </div>
  </div>
</aside>
{{- end }}
