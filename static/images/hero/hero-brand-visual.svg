<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-labelledby="hero-brand-title hero-brand-desc">
  <title id="hero-brand-title">OpenMS brand diagram</title>
  <desc id="hero-brand-desc">OpenMS logo mark with gradient mass spectrometry peak bars and spectral trace</desc>
  <defs>
    <linearGradient id="openms-brand-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3157e9" />
      <stop offset="23%" stop-color="#b503ff" />
      <stop offset="54%" stop-color="#ff03cb" />
      <stop offset="78%" stop-color="#ff7501" />
      <stop offset="100%" stop-color="#ffcb4f" />
    </linearGradient>
    <linearGradient id="openms-spectrum-stroke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3157e9" />
      <stop offset="22%" stop-color="#5280f0" />
      <stop offset="42%" stop-color="#b503ff" />
      <stop offset="56%" stop-color="#ff03cb" />
      <stop offset="70%" stop-color="#ff7501" />
      <stop offset="86%" stop-color="#ffcb4f" />
      <stop offset="100%" stop-color="#ffcb4f" />
    </linearGradient>
    <linearGradient id="openms-spectrum-fill" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3157e9" stop-opacity="0" />
      <stop offset="40%" stop-color="#5280f0" stop-opacity="0.12" />
      <stop offset="60%" stop-color="#ff03cb" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ffcb4f" stop-opacity="0.08" />
    </linearGradient>
    <filter id="openms-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- OpenMS "O" mark (simplified from logo) -->
  <g transform="translate(400 118)" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="0" cy="0" r="54" stroke-width="7" opacity="0.95" />
    <circle cx="0" cy="0" r="37" stroke-width="5" opacity="0.82" />
  </g>

  <!-- Logo-style gradient peak bars -->
  <g transform="translate(72 168)" fill="url(#openms-brand-gradient)" filter="url(#openms-glow)">
    <rect x="0" y="118" width="20" height="72" rx="2" />
    <rect x="30" y="83" width="20" height="107" rx="2" />
    <rect x="60" y="28" width="20" height="162" rx="2" />
    <rect x="90" y="106" width="20" height="84" rx="2" />
    <rect x="120" y="144" width="20" height="46" rx="2" />
    <rect x="150" y="133" width="20" height="57" rx="2" />
    <rect x="180" y="66" width="20" height="124" rx="2" />
    <rect x="210" y="95" width="20" height="95" rx="2" />
    <rect x="240" y="38" width="20" height="152" rx="2" />
    <rect x="270" y="74" width="20" height="116" rx="2" />
    <rect x="300" y="56" width="20" height="134" rx="2" />
    <rect x="330" y="17" width="20" height="173" rx="2" />
    <rect x="360" y="70" width="20" height="120" rx="2" />
    <rect x="390" y="103" width="20" height="87" rx="2" />
    <rect x="420" y="49" width="20" height="141" rx="2" />
    <rect x="450" y="88" width="20" height="102" rx="2" />
    <rect x="480" y="124" width="20" height="66" rx="2" />
    <rect x="510" y="110" width="20" height="80" rx="2" />
    <rect x="540" y="133" width="20" height="57" rx="2" />
    <rect x="570" y="142" width="20" height="48" rx="2" />
    <rect x="600" y="126" width="20" height="64" rx="2" />
    <rect x="630" y="138" width="20" height="52" rx="2" />
  </g>

  <!-- Chromatogram trace -->
  <g transform="translate(0 0)" opacity="0.92">
    <path
      fill="url(#openms-spectrum-fill)"
      d="M40 400 L64 399 L88 401 L112 398 L136 400 L160 399 L184 401 L208 398 L232 400 L256 399 L280 401 L304 398 L328 400 L352 399 L376 401 L400 398 L424 400 L442 358 L460 400 L468 400 L486 332 L504 400 L512 400 L530 268 L548 400 L556 400 L574 322 L592 400 L600 400 L618 288 L636 400 L644 400 L662 348 L680 400 L688 400 L706 304 L724 400 L732 400 L750 252 L768 400 L776 400 L794 336 L812 400 L760 400 L760 440 L40 440 Z"
      transform="translate(-8 0) scale(0.98 1)"
    />
    <path
      fill="none"
      stroke="url(#openms-spectrum-stroke)"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      filter="url(#openms-glow)"
      d="M40 400 L64 399 L88 401 L112 398 L136 400 L160 399 L184 401 L208 398 L232 400 L256 399 L280 401 L304 398 L328 400 L352 399 L376 401 L400 398 L424 400 L442 358 L460 400 L468 400 L486 332 L504 400 L512 400 L530 268 L548 400 L556 400 L574 322 L592 400 L600 400 L618 288 L636 400 L644 400 L662 348 L680 400 L688 400 L706 304 L724 400 L732 400 L750 252 L768 400 L776 400 L794 336 L812 400"
      transform="translate(-8 0) scale(0.98 1)"
    />
  </g>
</svg>
