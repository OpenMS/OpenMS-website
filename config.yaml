      webappsSection:
        eyebrow: Community tools
        title: Featured Apps
        titleHighlight: Apps
        description: >-
          Apps are scientifically validated end-to-end solutions for common
          proteomics and metabolomics analysis. Test online, then download and
          deploy locally.
        ctaText: View project
        showAll:
          text: Show all projects
